<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НВО България - Геопространствен Дашборд</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f6fa;
            color: #2f3640;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        .container {
            display: flex;
            flex-direction: row;
            height: calc(100vh - 64px);
        }
        #sidebar {
            width: 320px;
            background: white;
            padding: 20px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #718093;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #dcdde1;
            background-color: #f8f9fa;
            cursor: pointer;
            outline: none;
        }
        select:focus {
            border-color: #3498db;
        }
        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            margin-top: 10px;
        }
        .info-box h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        /* Стилизиране на легендата на картата */
        .legend {
            background: white;
            padding: 12px;
            line-height: 22px;
            color: #2f3640;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 13px;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 10px;
            opacity: 0.8;
            border-radius: 3px;
        }
        
        /* Мобилна адаптивност */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                height: auto;
                box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            }
            #map {
                height: 50vh;
            }
            
             /* Намаляваме размера на легендата */
            .info.legend {
                font-size: 10px !important;
                padding: 4px !important;
                max-width: 130px;
                background: rgba(255, 255, 255, 0.85) !important;
            }

            /* Намалени квадратчета */
            .info.legend i {
                width: 12px !important;
                height: 12px !important;
                margin-right: 4px !important;
            }

                .legend h4 {
                font-size: 12px !important;
                margin-bottom: 4px !important;
            }

            }
    </style>
</head>
<body>

<header>
    <h1>Резултати от НВО за VII клас по Общини в България</h1>
</header>

<div class="container">
    <div id="sidebar">
        <div class="control-group">
            <label>Учебна година:</label>
            <select id="yearSelect" onchange="updateDashboard()">
                <option value="2024-2025">2024-2025 г.</option>
                <option value="2023-2024">2023-2024 г.</option>
                <option value="2022-2023">2022-2023 г.</option>
                <option value="2021-2022">2021-2022 г.</option>
                <option value="2020-2021">2020-2021 г.</option>
                <option value="2019-2020">2019-2020 г.</option>
                <option value="2018-2019">2018-2019 г.</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Изпитен предмет:</label>
            <select id="subjectSelect" onchange="updateDashboard()">
                <option value="bel_score">Български език и литература (БЕЛ)</option>
                <option value="mat_score">Математика</option>
            </select>
        </div>
        
        <div class="info-box" id="detailsBox">
            <h3>Интерактивна карта</h3>
            <p>Задръжте мишката или кликнете върху община от картата, за да заредите подробните резултати.</p>
        </div>
        
        <div style="margin-top: 15px; font-size: 12px; color: #718093; text-align: center;">
            Източник на данните: <br>
            <a href="https://data.egov.bg/organisation/dataset/b56288b6-25aa-4049-9aa6-de2cd4cdabf8" target="_blank" style="color: #3498db; text-decoration: none; font-weight: bold;">Портал за отворени данни (data.egov.bg)</a>
        </div>

    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js"></script>

</body>
</html>
